<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#050e18"/>

  <!-- Outer hex -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="#061c28" stroke="#0ff8e7" stroke-width="1.5"/>
  <!-- Mid ring -->
  <polygon points="32,11 50,21.5 50,42.5 32,53 14,42.5 14,21.5" fill="none" stroke="#0a3a4f" stroke-width="1"/>
  <!-- Inner hex -->
  <polygon points="32,18 44,25 44,39 32,46 20,39 20,25" fill="#0a2535" stroke="#0ff8e7" stroke-width="0.8" opacity="0.6"/>

  <!-- Signal arcs -->
  <path d="M 25,27 A 8,8 0 0,1 39,27"  fill="none" stroke="#ffab00" stroke-width="1.5" opacity="0.9"/>
  <path d="M 22,30 A 11,11 0 0,1 42,30" fill="none" stroke="#ffab00" stroke-width="1.2" opacity="0.6"/>
  <path d="M 19,33 A 14,14 0 0,1 45,33" fill="none" stroke="#ffab00" stroke-width="1" opacity="0.35"/>

  <!-- Center dot -->
  <circle cx="32" cy="40" r="3" fill="#ffab00"/>
  <circle cx="32" cy="40" r="1.5" fill="#050e18"/>

  <!-- S letterform -->
  <line x1="26" y1="20" x2="38" y2="20" stroke="#0ff8e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="20" x2="26" y2="26" stroke="#0ff8e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="26" x2="38" y2="26" stroke="#0ff8e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="26" x2="38" y2="32" stroke="#0ff8e7" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="32" x2="26" y2="32" stroke="#0ff8e7" stroke-width="2" stroke-linecap="round"/>

  <!-- Circuit dots at hex corners -->
  <circle cx="32" cy="4"  r="2" fill="#0ff8e7" opacity="0.8"/>
  <circle cx="56" cy="18" r="2" fill="#ffab00" opacity="0.8"/>
  <circle cx="56" cy="46" r="2" fill="#0ff8e7" opacity="0.6"/>
  <circle cx="32" cy="60" r="2" fill="#0ff8e7" opacity="0.6"/>
  <circle cx="8"  cy="18" r="2" fill="#0ff8e7" opacity="0.4"/>
  <circle cx="8"  cy="46" r="2" fill="#0ff8e7" opacity="0.4"/>
</svg>
